name: Run Unit Tests

on:
  push:
    branches:
      - '**'    # run on all branches
  pull_request:
    branches:
      - '**'

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Checkout unit-testing branch
      run: |
        git fetch origin unit-testing:unit-testing
        git checkout unit-testing

    - name: Install dependencies
      run: npm install  

    - name: Run unit tests
      run: npm run test  
