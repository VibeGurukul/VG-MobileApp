name: 'Android Build Release'
run-name: 'Android Build Release'

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_URL_STAGING: ${{ secrets.BASE_URL_STAGING }}
      BASE_URL_PRODUCTION: ${{ secrets.BASE_URL_PRODUCTION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js # <--- ADDED: Explicitly set Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Using Node.js 20 LTS, adjust if your project requires a different version

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 300000

      - name: Make Gradle wrapper executable
        run: |
          cd android
          chmod +x gradlew

      - name: Clean previous codegen artifacts # <--- ADDED: Clean existing generated files
        run: |
          rm -rf android/app/build/generated/source/codegen
          rm -rf build/generated/ios # Also clean iOS codegen output just in case

      - name: Generate New Architecture C++ code
        run: |
          # Ensure you are in the root of the React Native project to run codegen
          npx react-native codegen

      - name: Build application
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 3
